services:
  postgres:
    image: postgres:16-alpine
    container_name: template_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-template}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-template}
      POSTGRES_DB: ${POSTGRES_DB:-template}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-template} -d ${POSTGRES_DB:-template}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
